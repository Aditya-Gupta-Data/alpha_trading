<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha Trading</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #181b24;
    --surface-2: #1f2430;
    --line: #2a3040;
    --text: #e8eaf0;
    --muted: #8b92a6;
    --accent: #6c8cff;
    --up: #34d399;
    --down: #f87171;
    --alert: #fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    padding: 20px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px; margin-bottom: 4px;
  }
  h1 { font-size: 1.5rem; font-weight: 650; letter-spacing: -0.01em; }
  .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 20px; }
  button {
    background: var(--accent); color: #0b0e16; border: 0;
    font-size: 0.95rem; font-weight: 600; padding: 10px 18px;
    border-radius: 10px; cursor: pointer; transition: opacity .15s;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: default; }
  .meta { color: var(--muted); font-size: 0.82rem; margin: 14px 2px 16px; min-height: 1.2em; }
  .grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
  @media (min-width: 560px) { .grid { grid-template-columns: 1fr 1fr; } }
  .card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 14px; padding: 16px 18px;
  }
  .card.alert { border-color: var(--alert); background: var(--surface-2); }
  .card-top { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
  .ticker { font-size: 1.1rem; font-weight: 650; }
  .price { font-size: 1.05rem; font-weight: 600; }
  .price .pct { font-size: 0.82rem; font-weight: 600; margin-left: 6px; }
  .up { color: var(--up); } .down { color: var(--down); }
  .rule { color: var(--muted); font-size: 0.86rem; margin-top: 8px; }
  .badge {
    display: inline-block; margin-top: 12px; font-size: 0.74rem; font-weight: 600;
    padding: 3px 10px; border-radius: 999px;
  }
  .badge.watching { background: #232838; color: var(--muted); }
  .badge.alert { background: var(--alert); color: #3a2c00; }
  .badge.err { background: #2a1d1d; color: var(--down); }
  .empty { color: var(--muted); text-align: center; padding: 40px 0; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Alpha Trading</h1>
    <button id="checkBtn" onclick="runCheck()">Check now</button>
  </header>
  <div class="sub">Your watchlist for Indian stocks (NSE / BSE)</div>
  <div class="meta" id="meta">Tap "Check now" to pull the latest prices.</div>
  <div class="grid" id="grid"></div>
</div>

<script>
  function ruleText(condition, value) {
    switch (condition) {
      case "price_above": return "Alert if price goes above " + value;
      case "price_below": return "Alert if price drops below " + value;
      case "percent_up": return "Alert if up " + value + "% or more today";
      case "percent_down": return "Alert if down " + value + "% or more today";
      default: return condition + " " + value;
    }
  }

  function card(r) {
    if (!r.ok) {
      return '<div class="card"><div class="card-top"><span class="ticker">'
        + r.ticker + '</span></div><div class="rule">' + r.message
        + '</div><span class="badge err">No data</span></div>';
    }
    const dir = r.percent_change >= 0 ? "up" : "down";
    const sign = r.percent_change >= 0 ? "+" : "";
    const isAlert = r.triggered;
    return '<div class="card ' + (isAlert ? "alert" : "") + '">'
      + '<div class="card-top"><span class="ticker">' + r.ticker + '</span>'
      + '<span class="price">\u20B9' + r.price
      + '<span class="pct ' + dir + '">' + sign + r.percent_change + '%</span></span></div>'
      + '<div class="rule">' + ruleText(r.condition, r.value) + '</div>'
      + '<span class="badge ' + (isAlert ? "alert" : "watching") + '">'
      + (isAlert ? "Alert" : "Watching") + '</span></div>';
  }

  async function runCheck() {
    const btn = document.getElementById("checkBtn");
    const meta = document.getElementById("meta");
    const grid = document.getElementById("grid");
    btn.disabled = true; meta.textContent = "Checking\u2026";
    try {
      const res = await fetch("/api/check");
      const data = await res.json();
      if (!data.length) {
        grid.innerHTML = '<div class="empty">Your watchlist is empty. Add stocks in config/watchlist.yaml</div>';
      } else {
        grid.innerHTML = data.map(card).join("");
      }
      const fired = data.filter(r => r.triggered).length;
      const now = new Date().toLocaleTimeString();
      meta.textContent = "Last checked " + now + " \u00B7 " + fired + " alert(s)";
    } catch (e) {
      meta.textContent = "Couldn't reach the server. Is it still running?";
    } finally {
      btn.disabled = false;
    }
  }

  runCheck();
</script>
</body>
</html>
