# ─────────────────────────────────────────────────────────────
# YOUR WATCHLIST
# This is the only file you need to edit day-to-day. No coding required.
#
# Add one block per rule. Each rule needs three things:
#   ticker     - the stock symbol. NSE stocks end in .NS, BSE stocks end in .BO
#                e.g. RELIANCE.NS, TCS.NS, INFY.NS, HDFCBANK.NS
#   condition  - what should trigger the alert (see the list below)
#   value      - the number that goes with the condition
#
# Conditions available right now:
#   price_above    -> alert when price goes ABOVE value
#   price_below    -> alert when price drops BELOW value
#   percent_up     -> alert when the stock is UP value% or more today
#   percent_down   -> alert when the stock is DOWN value% or more today
#
# (We'll add more condition types whenever you want them.)
# ─────────────────────────────────────────────────────────────

