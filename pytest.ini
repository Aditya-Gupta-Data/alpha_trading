[pytest]
testpaths = tests

# `pytest`                 → full suite (default; nothing is skipped)
# `pytest -m "not slow"`   → fast inner loop, skips the heavy statistical/ML/
#                            simulation files (see conftest.py for the list)
# `pytest -n auto`         → parallel, if pytest-xdist is installed (optional)
markers =
    slow: heavy statistical/ML/simulation test — skip with -m "not slow"
