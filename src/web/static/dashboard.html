<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ADiTrader — Open Positions</title>
<style>
  /* Dark terminal aesthetic — no frameworks, no build step. */
  :root {
    --bg: #0b0f0c;
    --panel: #10161200;
    --grid: #1e2a20;
    --text: #c8e6c9;
    --dim: #6b8f6e;
    --accent: #4ade80;
    --red: #f87171;
    --amber: #fbbf24;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 24px;
    background: var(--bg); color: var(--text);
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    font-size: 14px; line-height: 1.5;
  }
  header {
    display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
    border-bottom: 1px solid var(--grid); padding-bottom: 12px;
  }
  h1 { font-size: 16px; margin: 0; letter-spacing: 1px; color: var(--accent); }
  h1::before { content: "▮ "; }
  .badge { color: var(--dim); font-size: 12px; }
  #conn {
    font-size: 12px; padding: 1px 8px; border: 1px solid var(--grid);
    border-radius: 3px; color: var(--dim);
  }
  #conn.live { color: var(--accent); border-color: var(--accent); }
  #conn.down { color: var(--red); border-color: var(--red); }
  #refresh {
    margin-left: auto; cursor: pointer;
    background: transparent; color: var(--accent);
    border: 1px solid var(--accent); border-radius: 3px;
    font: inherit; font-size: 13px; padding: 4px 14px;
  }
  #refresh:hover { background: rgba(74, 222, 128, 0.12); }
  #refresh:active { transform: translateY(1px); }
  #asof { color: var(--dim); font-size: 12px; }
  /* Single-pane strips: P&L summary + 7-department health, both above the
     positions table. Same terminal palette, no framework, no build step. */
  .strip {
    display: flex; gap: 22px; flex-wrap: wrap; align-items: center;
    margin-top: 16px; padding: 12px 16px;
    border: 1px solid var(--grid); border-radius: 4px;
    background: rgba(30, 42, 32, 0.22);
  }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-label {
    color: var(--dim); font-size: 11px;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .stat-val { font-size: 15px; }
  #dept-strip { gap: 16px; }
  .dept { display: flex; align-items: center; gap: 7px; font-size: 12px; }
  .dept-num { color: var(--dim); }
  .dot {
    width: 9px; height: 9px; border-radius: 50%; flex: none;
    background: var(--dim); color: var(--dim); box-shadow: 0 0 6px currentColor;
  }
  .dot.up   { background: var(--accent); color: var(--accent); }
  .dot.warn { background: var(--amber);  color: var(--amber); }
  .dot.down { background: var(--red);    color: var(--red); }
  .dot.inline  { background: var(--dim); color: var(--dim); box-shadow: none; }
  .dot.unknown { background: transparent; color: var(--dim);
                 box-shadow: none; border: 1px solid var(--dim); }
  .host-line { color: var(--dim); font-size: 11px; margin-left: auto; }
  #table-wrap { overflow-x: auto; margin-top: 18px; }
  table { border-collapse: collapse; width: 100%; }
  th, td {
    text-align: left; padding: 7px 12px;
    border-bottom: 1px solid var(--grid); white-space: nowrap;
  }
  th {
    color: var(--dim); font-weight: normal; font-size: 12px;
    text-transform: uppercase; letter-spacing: 1px;
  }
  td.num, th.num { text-align: right; }
  .pnl-pos { color: var(--accent); }
  .pnl-neg { color: var(--red); }
  .pnl-na { color: var(--dim); }
  .strategy { color: var(--dim); }
  .detail { color: var(--dim); font-size: 12px; }
  #empty, #error {
    margin-top: 24px; color: var(--dim); display: none;
  }
  #error { color: var(--red); }
  footer {
    margin-top: 20px; padding-top: 12px;
    border-top: 1px solid var(--grid);
    color: var(--dim); font-size: 12px;
    display: flex; gap: 24px; flex-wrap: wrap;
  }
  #exposure { color: var(--amber); }
</style>
</head>
<body>
<header>
  <h1>ADiTrader</h1>
  <span class="badge">open paper positions — read-only</span>
  <span id="conn">connecting…</span>
  <span id="asof"></span>
  <button id="refresh" type="button">Manual Status Check ⟳</button>
</header>

<section id="pnl-strip" class="strip" aria-live="polite" aria-label="daily P&amp;L">
  <div class="stat"><span class="stat-label">Net P&amp;L</span><span class="stat-val pnl-na" id="pnl-net">–</span></div>
  <div class="stat"><span class="stat-label">Realized</span><span class="stat-val pnl-na" id="pnl-realized">–</span></div>
  <div class="stat"><span class="stat-label">Open (marked)</span><span class="stat-val pnl-na" id="pnl-open">–</span></div>
  <div class="stat"><span class="stat-label">Exposure</span><span class="stat-val" id="pnl-exposure">–</span></div>
</section>

<section id="dept-strip" class="strip" aria-live="polite" aria-label="department health"></section>

<div id="table-wrap">
<table id="positions" aria-live="polite">
  <thead>
    <tr>
      <th>Symbol</th><th>Strategy</th>
      <th class="num">Entry</th><th class="num">Target</th>
      <th class="num">Stop</th><th class="num">Live P&amp;L</th>
      <th>In Trade</th><th>Expiry</th><th>ID</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>
</div>
<div id="empty">No open paper positions — everything is settled.</div>
<div id="error"></div>

<footer>
  <span id="exposure"></span>
  <span id="count"></span>
  <span>updates: manual button + server-sent events only — this page never polls</span>
</footer>

<script>
/* Anti-polling contract: fetches happen on (1) page load, (2) the manual
   button, (3) a server-sent "changed" event. There is deliberately no
   timer of any kind in this file — the server watches engine state and
   tells us when reality moved. */
"use strict";

const tbody = document.querySelector("#positions tbody");
const conn = document.getElementById("conn");
const asof = document.getElementById("asof");
const emptyMsg = document.getElementById("empty");
const errorMsg = document.getElementById("error");
const exposureEl = document.getElementById("exposure");
const countEl = document.getElementById("count");

function rs(v, signed) {
  if (v === null || v === undefined) return "–";
  const num = Number(v).toLocaleString("en-IN",
      {minimumFractionDigits: 2, maximumFractionDigits: 2});
  return (signed && v > 0 ? "+" : "") + "₹" + num;
}

function targetCell(p) {
  if (p.kind === "spread") return "max " + rs(p.max_profit_rs);
  return rs(p.target);
}

function stopCell(p) {
  if (p.kind === "spread") return "max −" + rs(p.max_loss_rs).replace("₹", "₹");
  return rs(p.stop_loss);
}

function pnlCell(p) {
  if (p.live_pnl_rs === null || p.live_pnl_rs === undefined) {
    return '<span class="pnl-na">n/a</span>';
  }
  const cls = p.live_pnl_rs >= 0 ? "pnl-pos" : "pnl-neg";
  const detail = p.live_detail
      ? ' <span class="detail">(' + p.live_detail + ")</span>" : "";
  return '<span class="' + cls + '">' + rs(p.live_pnl_rs, true) + "</span>" + detail;
}

function escapeHtml(s) {
  return String(s ?? "–").replace(/[&<>"']/g,
      c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function render(data) {
  errorMsg.style.display = "none";
  const positions = data.positions || [];
  tbody.innerHTML = positions.map(p => `
    <tr>
      <td>${escapeHtml(p.ticker)}</td>
      <td class="strategy">${escapeHtml((p.strategy || p.kind || "–").replace(/_/g, " "))}</td>
      <td class="num">${rs(p.entry_price)}</td>
      <td class="num">${targetCell(p)}</td>
      <td class="num">${stopCell(p)}</td>
      <td class="num">${pnlCell(p)}</td>
      <td>${p.days_in_trade !== null && p.days_in_trade !== undefined ? p.days_in_trade + "d" : "–"}</td>
      <td>${escapeHtml(p.expiry || "–")}</td>
      <td class="detail">${escapeHtml(p.trade_id)}</td>
    </tr>`).join("");
  emptyMsg.style.display = positions.length ? "none" : "block";
  countEl.textContent = positions.length + " open position(s), paper only";
  asof.textContent = "as of " + (data.as_of || "?");
  const e = data.exposure;
  exposureEl.textContent = e
      ? "exposure: " + rs(e.locked_margin_rs) + " locked of " + rs(e.equity_rs)
        + (e.exposure_pct !== null ? " (" + e.exposure_pct.toFixed(1) + "%)" : "")
      : "exposure: n/a";
}

/* --- Single-pane strips: daily P&L + 7-department health --------------- */

function renderPnl(d) {
  const setSigned = (id, v) => {
    const el = document.getElementById(id);
    if (v === null || v === undefined) { el.textContent = "n/a"; el.className = "stat-val pnl-na"; return; }
    el.textContent = rs(v, true);
    el.className = "stat-val " + (v > 0 ? "pnl-pos" : v < 0 ? "pnl-neg" : "");
  };
  setSigned("pnl-net", d.net_pnl_rs);
  setSigned("pnl-realized", d.realized_pnl_rs);

  const openEl = document.getElementById("pnl-open");
  if (d.open_pnl_rs === null || d.open_pnl_rs === undefined) {
    openEl.textContent = "n/a" + (d.open_unmarked ? " (" + d.open_unmarked + " unpriced)" : "");
    openEl.className = "stat-val pnl-na";
  } else {
    openEl.textContent = rs(d.open_pnl_rs, true)
        + (d.open_unmarked ? " (" + d.open_unmarked + " unpriced)" : "");
    openEl.className = "stat-val " + (d.open_pnl_rs >= 0 ? "pnl-pos" : "pnl-neg");
  }

  const e = d.exposure, expEl = document.getElementById("pnl-exposure");
  expEl.textContent = e
      ? rs(e.locked_margin_rs) + (e.exposure_pct !== null && e.exposure_pct !== undefined
          ? " (" + e.exposure_pct.toFixed(1) + "%)" : "")
      : "n/a";
  expEl.className = "stat-val";
  expEl.style.color = e ? "var(--amber)" : "var(--dim)";
}

function renderDepts(d) {
  const strip = document.getElementById("dept-strip");
  const depts = d.departments || [];
  strip.innerHTML = depts.map(dep => `
    <span class="dept" title="${escapeHtml(dep.detail || "")}">
      <span class="dot ${escapeHtml(dep.status)}"></span>
      <span class="dept-num">${escapeHtml(dep.n)}</span>${escapeHtml(dep.name)}
    </span>`).join("");
  const h = d.host;
  if (h) {
    const fmt = (v, s) => (v === null || v === undefined) ? "?" : v + (s || "");
    const host = document.createElement("span");
    host.className = "host-line";
    host.textContent = "mem " + fmt(h.mem_used_pct, "%")
        + " · disk " + fmt(h.disk_free_gb, "GB") + " free · load " + fmt(h.load_1m);
    strip.appendChild(host);
  }
}

/* Behind the Phase 9 gateway every route needs the API key, and
   EventSource cannot send headers — so the key rides as ?api_key=...
   on the page URL (open /dashboard?api_key=YOURKEY) and is propagated
   to both endpoints here. Keyless local dev works unchanged. */
const API_KEY = new URLSearchParams(window.location.search).get("api_key");
const KEY_QS = API_KEY ? "?api_key=" + encodeURIComponent(API_KEY) : "";

async function refresh(reason) {
  try {
    const resp = await fetch("/api/web/positions" + KEY_QS, {cache: "no-store"});
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    render(await resp.json());
  } catch (err) {
    errorMsg.textContent = "fetch failed (" + err.message +
        ") — is the API running? Retry with the button.";
    errorMsg.style.display = "block";
  }
  /* The P&L and department strips degrade independently: a failure in
     either one must never blank the positions table above. */
  fetch("/api/web/pnl" + KEY_QS, {cache: "no-store"})
      .then(r => r.ok ? r.json() : Promise.reject()).then(renderPnl).catch(() => {});
  fetch("/api/web/departments" + KEY_QS, {cache: "no-store"})
      .then(r => r.ok ? r.json() : Promise.reject()).then(renderDepts).catch(() => {});
}

document.getElementById("refresh").addEventListener("click",
    () => refresh("manual"));

/* Mechanism B: the server emits an event only when the journal or the
   master scheduler's log actually changed. EventSource reconnects on
   its own after drops — still not polling, the browser just listens. */
const events = new EventSource("/api/web/events" + KEY_QS);
events.onopen = () => { conn.textContent = "● live"; conn.className = "live"; };
events.onerror = () => { conn.textContent = "● reconnecting"; conn.className = "down"; };
events.onmessage = (e) => {
  try {
    const msg = JSON.parse(e.data);
    if (msg.event === "changed") refresh("event");
  } catch (_) { /* keepalives and comments are ignored */ }
};

refresh("load");
</script>
</body>
</html>
